<!doctype html>
<html lang="ru" class="no-js">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4e8dc">
  <meta name="robots" content="noindex, nofollow">
  <title>Ответы гостей | Смирнова Александра и Березкин Иван</title>
  <style>
    :root{--bg:#f6efe6;--paper:rgba(255,252,247,.9);--text:#2f2721;--muted:#6f6256;--accent:#9b7852;--line:rgba(82,61,42,.12);--shadow:0 24px 60px rgba(64,47,29,.12);--serif:Georgia,"Times New Roman",serif;--sans:"Segoe UI",Inter,Arial,sans-serif}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;font-family:var(--sans);color:var(--text);background:linear-gradient(180deg,#fbf7f1 0%,var(--bg) 100%)}
    .page{width:min(980px,calc(100% - 24px));margin:0 auto;padding:20px 0 40px;position:relative}
    .page:before{content:"";position:fixed;inset:-8rem auto auto -8rem;width:18rem;height:18rem;border-radius:50%;background:radial-gradient(circle,rgba(220,201,181,.45),rgba(220,201,181,0) 70%);filter:blur(10px);pointer-events:none}
    .card,.stats .stat{background:var(--paper);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
    .card{padding:24px}.badge{display:inline-flex;align-items:center;padding:10px 16px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.5);color:var(--accent);letter-spacing:.24em;text-transform:uppercase;font-size:.72rem;font-weight:700}
    h1,h2{font-family:var(--serif);font-weight:500;letter-spacing:-.03em;margin:0}
    h1{font-size:clamp(2.2rem,5vw,4rem);line-height:1;margin-top:10px}h2{font-size:clamp(1.5rem,3vw,2.2rem);line-height:1.1}
    p{margin:12px 0 0;color:var(--muted);line-height:1.75}
    .form{margin-top:18px;display:grid;gap:12px}.field{display:grid;gap:6px}.field label{color:var(--accent);text-transform:uppercase;letter-spacing:.18em;font-size:.7rem;font-weight:700}
    input{width:100%;padding:15px 16px;border-radius:16px;border:1px solid rgba(82,61,42,.12);background:rgba(255,255,255,.8);color:var(--text);font:inherit}
    input:focus{outline:none;border-color:rgba(155,120,82,.35);box-shadow:0 0 0 4px rgba(155,120,82,.12);background:#fff}
    .row{display:flex;flex-wrap:wrap;gap:10px}.btn{appearance:none;border:0;border-radius:999px;padding:14px 18px;font:inherit;font-weight:600;cursor:pointer;min-height:48px;transition:transform .18s ease,box-shadow .18s ease;background:rgba(255,255,255,.72);border:1px solid rgba(82,61,42,.14);color:var(--text)}
    .btn.primary{color:#fffaf5;background:linear-gradient(135deg,#2f2721 0%,#4f3e30 100%);box-shadow:0 12px 24px rgba(47,39,33,.2)}.btn:hover{transform:translateY(-1px)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}.stat{padding:14px 16px}.stat b{display:block;font-family:var(--serif);font-size:1.8rem;line-height:1;color:var(--accent);margin-bottom:4px}
    .list{margin-top:16px;display:grid;gap:10px}.item{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;padding:14px;border-radius:18px;border:1px solid rgba(82,61,42,.09);background:rgba(255,255,255,.62)}
    .name{font-size:1.02rem;font-weight:700}.pill{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-size:.76rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}.going{background:rgba(209,224,202,.75);color:#3f5c34}.not-going{background:rgba(242,216,210,.8);color:#7a3427}.maybe{background:rgba(238,228,200,.84);color:#7a6030}.solo{background:rgba(219,227,233,.9);color:#40576a}.pair{background:rgba(233,223,205,.88);color:#7a6030}.meta{margin-top:8px;color:var(--muted);line-height:1.65}
    .empty{padding:20px;border:1px dashed rgba(82,61,42,.16);border-radius:18px;color:var(--muted);line-height:1.8;text-align:center}
    .footer{margin-top:16px;text-align:center;color:var(--muted);font-family:var(--serif)}
    .toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,20px);padding:12px 18px;border-radius:999px;background:rgba(47,39,33,.96);color:#fffaf5;box-shadow:0 20px 40px rgba(47,39,33,.24);opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease;z-index:20;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}
    .js .reveal{opacity:0;transform:translateY(16px);transition:opacity .7s ease,transform .7s ease;transition-delay:var(--d,0ms)}.js .reveal.on{opacity:1;transform:none}
    @media (max-width:720px){.stats{grid-template-columns:1fr 1fr}.item{grid-template-columns:1fr}}@media (max-width:540px){.page{width:min(100% - 16px,980px)}.stats{grid-template-columns:1fr}.row .btn{width:100%}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}html{scroll-behavior:auto}}
  </style>
</head>
<body>
  <main class="page">
    <div class="badge reveal">Для жениха и невесты</div>
    <section class="card reveal">
      <h1>Ответы гостей</h1>
      <p>Введите код доступа и смотрите ответы, которые гости оставляют в приглашении.</p>
      <form id="access-form" class="form">
        <div class="field">
          <label for="admin-key">Код доступа</label>
          <input id="admin-key" type="password" placeholder="Код доступа" autocomplete="one-time-code" required>
        </div>
        <div class="row">
          <button class="btn primary" type="submit">Открыть</button>
          <button class="btn" type="button" id="refresh">Обновить</button>
          <button class="btn" type="button" id="copy">Копировать JSON</button>
        </div>
      </form>
    </section>

    <section class="stats reveal" aria-label="Сводка">
      <div class="stat"><b id="going-count">0</b><span>Идут</span></div>
      <div class="stat"><b id="not-going-count">0</b><span>Не идут</span></div>
      <div class="stat"><b id="maybe-count">0</b><span>Ещё не ясно</span></div>
      <div class="stat"><b id="total-count">0</b><span>Всего ответов</span></div>
    </section>

    <section class="card reveal" style="margin-top:16px">
      <h2>Кто идёт, а кто нет</h2>
      <div class="list" id="list" aria-live="polite"></div>
    </section>

    <div class="footer reveal">Ответы обновляются автоматически.</div>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>
    const LOCAL_API_ROOT='/api/responses', TOKEN='5c7371a5-7d0e-4129-a96b-4a054daf2944', WEBHOOK_REQUESTS=`https://webhook.site/token/${TOKEN}/requests`, KEY='wedding-admin-key-v1';
    const accessForm=document.getElementById('access-form'), keyInput=document.getElementById('admin-key'), refreshBtn=document.getElementById('refresh'), copyBtn=document.getElementById('copy'), list=document.getElementById('list'), toast=document.getElementById('toast');
    const counts={going:document.getElementById('going-count'),notGoing:document.getElementById('not-going-count'),maybe:document.getElementById('maybe-count'),total:document.getElementById('total-count')};
    const revealItems=document.querySelectorAll('.reveal'); let key=sessionStorage.getItem(KEY)||'', responses=[], toastTimer=null, autoTimer=null;
    const showToast=(m)=>{toast.textContent=m;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),2200)};
    const esc=(v)=>String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmt=(v)=>{try{return new Intl.DateTimeFormat('ru-RU',{dateStyle:'medium',timeStyle:'short'}).format(new Date(v))}catch{return v}};
    const status=(v)=>v==='going'?['Идёт','going']:v==='not-going'?['Не идёт','not-going']:['Пока не знает','maybe'];
    const party=(v)=>v==='pair'?['В паре','pair']:['Один','solo'];
    const lock=(m)=>{counts.going.textContent=counts.notGoing.textContent=counts.maybe.textContent=counts.total.textContent='0'; list.innerHTML=`<div class="empty">${esc(m)}</div>`};
    const parseLocal=(item)=>({id:String(item.id||''),name:String(item.name||'').trim()||'Гость',status:['going','not-going','maybe'].includes(item.status)?item.status:'maybe',partySize:['solo','pair'].includes(item.partySize)?item.partySize:'solo',note:String(item.note||'').trim(),createdAt:String(item.createdAt||new Date().toISOString())});
    const parseWebhook=(item)=>{let p={};try{p=item.content?JSON.parse(item.content):{}}catch{} return {id:String(item.uuid||''),name:String(p.name||'').trim()||'Гость',status:['going','not-going','maybe'].includes(p.status)?p.status:'maybe',partySize:['solo','pair'].includes(p.partySize)?p.partySize:'solo',note:String(p.note||'').trim(),createdAt:String(item.created_at||new Date().toISOString())}};
    const render=()=>{counts.going.textContent=responses.filter(r=>r.status==='going').length;counts.notGoing.textContent=responses.filter(r=>r.status==='not-going').length;counts.maybe.textContent=responses.filter(r=>r.status==='maybe').length;counts.total.textContent=responses.length;
      list.innerHTML=responses.length?responses.map(r=>{const s=status(r.status); const p=party(r.partySize); return `<article class="item"><div><div class="response-top"><div class="name">${esc(r.name)}</div><span class="pill ${s[1]}">${s[0]}</span><span class="pill ${p[1]}">${p[0]}</span></div><div class="meta">Добавлено: ${esc(fmt(r.createdAt))}${r.note?`<div>Примечание: ${esc(r.note)}</div>`:''}</div></div></article>`}).join(''):`<div class="empty">Пока нет ответов. Как только гости начнут заполнять приглашение, они появятся здесь.</div>`};
    async function loadFromLocal(){ const r=await fetch(`${LOCAL_API_ROOT}?key=${encodeURIComponent(key)}`,{headers:{Accept:'application/json'}}); if(!r.ok) throw new Error('Local API unavailable'); const payload=await r.json(); responses=Array.isArray(payload.responses)?payload.responses.map(parseLocal):[]; }
    async function loadFromWebhook(){ const r=await fetch(`${WEBHOOK_REQUESTS}?sorting=newest&per_page=100`,{headers:{Accept:'application/json','Content-Type':'application/json'}}); if(!r.ok) throw new Error('Webhook unavailable'); const payload=await r.json(); responses=(payload.data||[]).filter(x=>x.method==='POST').map(parseWebhook); }
    async function load(silent=false){ if(!key){lock('Введите код доступа, чтобы увидеть ответы.');return false} try{await loadFromLocal()}catch(localError){try{await loadFromWebhook()}catch(webhookError){ if(!silent) showToast('Не удалось загрузить ответы'); return false }} render(); return true }
    const startAuto=()=>{clearInterval(autoTimer); autoTimer=setInterval(()=>{if(key) load(true)},15000)};
    revealItems.forEach((el,i)=>el.style.setProperty('--d',`${i*90}ms`)); document.documentElement.classList.remove('no-js'); document.documentElement.classList.add('js');
    if ('IntersectionObserver' in window) { const observer=new IntersectionObserver((entries)=>entries.forEach((e)=>{if(e.isIntersecting){e.target.classList.add('on');observer.unobserve(e.target)}}),{threshold:.2}); revealItems.forEach((el)=>observer.observe(el)); } else { revealItems.forEach((el)=>el.classList.add('on')); }
    const boot=()=>{keyInput.value=key; load(true); startAuto()};
    if(key){boot()} else {lock('Введите код доступа, чтобы увидеть ответы.')}
    accessForm.addEventListener('submit',async(e)=>{e.preventDefault(); const next=keyInput.value.trim(); if(!next){showToast('Введите код доступа');return} key=next; sessionStorage.setItem(KEY,key); if(await load()){showToast('Доступ открыт')} startAuto()});
    refreshBtn.addEventListener('click',()=>{if(!keyInput.value.trim()&&!key){showToast('Введите код доступа');keyInput.focus();return} if(!key&&keyInput.value.trim()){key=keyInput.value.trim();sessionStorage.setItem(KEY,key)} load(); startAuto()});
    copyBtn.addEventListener('click',async()=>{if(!key){showToast('Сначала откройте доступ');return} const payload=JSON.stringify(responses,null,2); try{await navigator.clipboard.writeText(payload); showToast('JSON скопирован')}catch{showToast('Не удалось скопировать JSON')}});
  </script>
</body>
</html>
